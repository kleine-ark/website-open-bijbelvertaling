        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">

    <!-- Detail-modal voor encyclopedie-artikelen -->
    <div class="detail-modal" id="detail-modal" onclick="if(event.target===this)closeDetail()">
        <div class="detail-card">
            <button class="detail-close" onclick="closeDetail()">&times;</button>

    <script>
    let alleBegrippen = [];
    let activeCat = null;
    let huidigeBron = 'encyclopedie';
    // Volledige encyclopedie-data (voor detail-weergave en cross-link vanuit boek-lijsten)
    let encycData = { easton: {}, nave: {}, eastonSum: {}, naveSum: {}, mapping: {} };
    let nlBegrippenIndex = {}; // woord(lower) → entry from supplement

    function escapeHTML(s) {
        return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Boek-afkorting → slug (zoals gebruikt in begrip-refs)
    const BOOK_SLUG = {
        'gen':'genesis','ex':'exodus','lev':'leviticus','num':'numeri','deut':'deuteronomium',
        'joz':'jozua','richt':'richteren','ruth':'ruth',
        '1 sam':'1samuel','2 sam':'2samuel','1 kon':'1koningen','2 kon':'2koningen',
        '1 kron':'1kronieken','2 kron':'2kronieken','ezra':'ezra','neh':'nehemia','esth':'esther','est':'esther',
        'job':'job','ps':'psalmen','psa':'psalmen','psalm':'psalmen',
        'spr':'spreuken','pred':'prediker','hoogl':'hooglied','hgl':'hooglied',
        'jes':'jesaja','jer':'jeremia','klaagl':'klaagliederen','klg':'klaagliederen',
        'ezech':'ezechiel','ez':'ezechiel','dan':'daniel','hos':'hosea','joel':'joel','joël':'joel',
        'amos':'amos','obad':'obadja','jona':'jona','micha':'micha','mi':'micha','nah':'nahum',
        'hab':'habakuk','zef':'zefanja','hagg':'haggai','hag':'haggai','zach':'zacharia','mal':'maleachi',
        'mat':'mattheus','matt':'mattheus','mt':'mattheus','mark':'markus','mk':'markus','mar':'markus',
        'luk':'lukas','lk':'lukas','luc':'lukas','joh':'johannes',
        'hand':'handelingen','rom':'romeinen',
        '1 kor':'1korinthiers','2 kor':'2korinthiers','1 cor':'1korinthiers','2 cor':'2korinthiers',
        'gal':'galaten','ef':'efeziers','efez':'efeziers','filip':'filippenzen','fil':'filippenzen',
        'kol':'kolossenzen','col':'kolossenzen',
        '1 tess':'1tessalonicensen','2 tess':'2tessalonicensen','1 th':'1tessalonicensen','2 th':'2tessalonicensen',
        '1 tim':'1timotheus','2 tim':'2timotheus','tit':'titus','filem':'filemon','flm':'filemon',
        'hebr':'hebreeen','heb':'hebreeen','jak':'jakobus','jac':'jakobus',
        '1 petr':'1petrus','2 petr':'2petrus','1 pet':'1petrus','2 pet':'2petrus',
        '1 joh':'1johannes','2 joh':'2johannes','3 joh':'3johannes','jud':'judas',
        'op':'openbaring','openb':'openbaring','apoc':'openbaring',
        'wijsh':'boekderwijsheid','sirach':'jezussirach','tob':'tobit','jdt':'judith','bar':'baruch',
    };

    /** Maak alle refs in een tekstblok klikbaar (bv. binnen uitleg). */
    function linkifyText(text) {
        if (!text) return text;
        // Match: Ps 18:3, "1 Kor 13:1", Joh 4:23 etc. — buiten bestaande <a>-tags.
        return text.replace(/(\b(?:[123]\s)?[A-Z][a-zé]{1,9}\.?\s+\d+:\d+(?:[-,]\d+)*)/g, m => {
            const link = refToLink(m);
            return link.startsWith('<a') ? link : m;
        });
    }

    /** Maak een ref als "Ps 18:3" of "1 Kor 13:1" klikbaar naar /#slug/chapter */
    function refToLink(ref) {
        if (!ref) return '';
        const m = ref.match(/^([123]\s)?([A-Za-zé]+)\.?\s+(\d+)(?::(\d+(?:[-,]\d+)*))?/);
        if (!m) return escapeHTML(ref);
        const prefix = (m[1] || '').trim();
        const book = m[2].toLowerCase();
        const ch = m[3];
        const vs = m[4];
        const key = (prefix ? prefix + ' ' : '') + book;
        const slug = BOOK_SLUG[key] || BOOK_SLUG[book];
        if (!slug) return escapeHTML(ref);
        const url = `/#${slug}/${ch}` + (vs ? `/${vs.split(/[,-]/)[0]}` : '');
        return `<a href="${url}" target="_top" class="begrip-ref-link" title="Open ${escapeHTML(ref)} in tekst">${escapeHTML(ref)}</a>`;
    }

    async function laadEncycRaw() {
        if (Object.keys(encycData.easton).length) return;  // al geladen
        const [easton, nave, eastonSum, naveSum, mapping, nlBegr] = await Promise.all([
            fetch('data/encyclopedie_easton.json').then(r=>r.json()),
            fetch('data/encyclopedie_nave.json').then(r=>r.json()),
            fetch('data/encyclopedie_easton_summaries.json').then(r=>r.json()),
            fetch('data/encyclopedie_nave_summaries.json').then(r=>r.json()),
            fetch('data/encyclopedie-mapping.json').then(r=>r.json()),
            fetch('data/encyclopedie_nl_begrippen.json').then(r=>r.json()),
        ]);
        encycData = { easton, nave, eastonSum, naveSum, mapping };
        nlBegrippenIndex = {};
        for (const e of nlBegr) {
            nlBegrippenIndex[e.woord.toLowerCase()] = e;
        }
        return nlBegr;
    }

    /** Vind encyclopedie-match voor een Nederlands woord. Returns {key, source} of null. */
    function findEncyc(woord) {
        if (!woord) return null;
        const lower = woord.toLowerCase();
        // Direct match (case-insensitive) in Easton
        for (const k of Object.keys(encycData.easton)) {
            if (k.toLowerCase() === lower) return { key: k, source: 'Easton' };
        }
        // Direct in Nave
        for (const k of Object.keys(encycData.nave)) {
            if (k.toLowerCase() === lower) return { key: k, source: 'Nave' };
        }
        // Via NL→EN mapping
        const mapKey = Object.keys(encycData.mapping).find(k => k.toLowerCase() === lower);
        if (mapKey) {
            const en = encycData.mapping[mapKey];
            if (encycData.easton[en]) return { key: en, source: 'Easton', viaNL: woord };
            if (encycData.nave[en]) return { key: en, source: 'Nave', viaNL: woord };
        }
        // In NL-begrippen supplement
        if (nlBegrippenIndex[lower]) return { key: nlBegrippenIndex[lower].woord, source: 'Begrippen' };
        return null;
    }

    async function laadBron(bron) {
        document.getElementById('begrippen-lijst').innerHTML = '<p style="color:#999;">Laden...</p>';
        activeCat = null;
        huidigeBron = bron;
        location.hash = bron === 'encyclopedie' ? '' : '#bron=' + bron;

        if (bron === 'encyclopedie') {
            try {
                const nlBegr = await laadEncycRaw();
                alleBegrippen = [];
                for (const [key, val] of Object.entries(encycData.easton)) {
                    alleBegrippen.push({ woord: key, uitleg: encycData.eastonSum[key] || '', categorie: 'Easton' });
                }
                for (const [key, val] of Object.entries(encycData.nave)) {
                    if (!encycData.easton[key]) {
                        alleBegrippen.push({ woord: key, uitleg: encycData.naveSum[key] || '', categorie: 'Nave' });
                    }
                }
                for (const e of nlBegr) {
                    alleBegrippen.push({
                        woord: e.woord, uitleg: e.uitleg, ref: e.ref, categorie: 'Begrippen',
                        boeken: e.boeken
                    });
                }
                alleBegrippen.sort((a, b) => a.woord.localeCompare(b.woord, 'nl'));
            } catch(e) {
                document.getElementById('begrippen-lijst').innerHTML = '<p style="color:#c00;">Fout bij laden encyclopedie: ' + escapeHTML(e.message) + '</p>';
                return;
            }
        } else {
            try {
                await laadEncycRaw();  // ook nodig voor cross-links
                const resp = await fetch(`data/begrippenlijst-${bron}.json`);
                alleBegrippen = await resp.json();
            } catch(e) {
                document.getElementById('begrippen-lijst').innerHTML = '<p style="color:#999;">Geen begrippenlijst beschikbaar voor dit boek.</p>';
                return;
            }
        }

        renderCategorieen();
        filterBegrippen();
    }

    function renderCategorieen() {
        const cats = [...new Set(alleBegrippen.map(b => b.categorie))].sort();
        const el = document.getElementById('cat-filters');
        el.innerHTML = `<button class="cat-btn active" data-cat="">Alle (${alleBegrippen.length})</button>` +
            cats.map(c => {
                const count = alleBegrippen.filter(b => b.categorie === c).length;
                return `<button class="cat-btn" data-cat="${escapeHTML(c)}">${escapeHTML(c)} (${count})</button>`;
            }).join('');
        el.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                el.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeCat = btn.dataset.cat || null;
                filterBegrippen();
            });
        });
    }

    function filterBegrippen() {
        const zoek = document.getElementById('begrip-zoek').value.toLowerCase();
        let filtered = alleBegrippen;
        if (activeCat) filtered = filtered.filter(b => b.categorie === activeCat);
        if (zoek) filtered = filtered.filter(b => b.woord.toLowerCase().includes(zoek) || (b.uitleg && b.uitleg.toLowerCase().includes(zoek)));

        document.getElementById('begrip-count').textContent = `${filtered.length} begrippen`;
        const html = filtered.slice(0, 100).map(b => {
            const cat = b.categorie || 'begrip';
            const catClass = ['Easton','Nave','Begrippen'].includes(cat) ? `cat-${cat}` : '';
            // Cross-link naar encyclopedie indien match (alleen op boek-lijsten)
            let encycBadge = '';
            if (huidigeBron !== 'encyclopedie') {
                const m = findEncyc(b.woord);
                if (m) {
                    encycBadge = `<a class="encyc-link" href="#woord=${encodeURIComponent(m.key)}" onclick="event.stopPropagation();openDetail('${encodeURIComponent(m.key)}','${m.source}');return false;">→ Encyclopedie (${m.source})</a>`;
                } else {
                    encycBadge = `<span class="encyc-missing" title="Geen encyclopedie-match">geen artikel</span>`;
                }
            }
            const refHtml = b.ref ? `<div class="begrip-ref" onclick="event.stopPropagation()">${refToLink(b.ref)}</div>` : '';
            const woordEnc = encodeURIComponent(b.woord);
            return `<div class="begrip-card" onclick="openDetail('${woordEnc}','${cat}')">
                <span class="begrip-woord">${escapeHTML(b.woord)}</span>
                <span class="begrip-cat ${catClass}">${escapeHTML(cat)}</span>
                ${encycBadge}
                <div class="begrip-uitleg">${escapeHTML(b.uitleg || '').slice(0, 280)}${b.uitleg && b.uitleg.length > 280 ? '…' : ''}</div>
                ${refHtml}
            </div>`;
        }).join('') + (filtered.length > 100 ? `<p style="color:#999;text-align:center;">… en ${filtered.length - 100} meer. Verfijn uw zoekopdracht.</p>` : '');
        document.getElementById('begrippen-lijst').innerHTML = html;
    }

    /** Open detail-modal voor een woord. Source: Easton/Nave/Begrippen. */
    function openDetail(woordEnc, source) {
        const woord = decodeURIComponent(woordEnc);
        let title = woord, body = '', meta = '';

        if (source === 'Easton' && encycData.easton[woord]) {
            const v = encycData.easton[woord];
            const sum = encycData.eastonSum[woord] || '';
            const en = (v.text_en || '').replace(/\[REF:([^|]+)\|([^\]]+)\]/g, '<a href="#" onclick="return false;">$2</a>');
            body = (sum ? `<p><strong>Nederlandse samenvatting:</strong> ${escapeHTML(sum)}</p><hr style="border:none;border-top:1px solid #eee;margin:14px 0;">` : '')
                 + `<p style="color:#666;font-size:13px;"><strong>Easton's Bible Dictionary (1893):</strong></p>${en}`;
            meta = `Easton's Bible Dictionary — sleutel: <code>${escapeHTML(woord)}</code>`;
        } else if (source === 'Nave' && encycData.nave[woord]) {
            const v = encycData.nave[woord];
            const sum = encycData.naveSum[woord] || '';
            const en = (v.text_en || '').replace(/\[REF:([^|]+)\|([^\]]+)\]/g, '<a href="#" onclick="return false;">$2</a>');
            body = (sum ? `<p><strong>Nederlandse samenvatting:</strong> ${escapeHTML(sum)}</p><hr style="border:none;border-top:1px solid #eee;margin:14px 0;">` : '')
                 + `<p style="color:#666;font-size:13px;"><strong>Nave's Topical Bible (1896):</strong></p>${en}`;
            meta = `Nave's Topical Bible — sleutel: <code>${escapeHTML(woord)}</code>`;
        } else if (source === 'Begrippen' && nlBegrippenIndex[woord.toLowerCase()]) {
            const e = nlBegrippenIndex[woord.toLowerCase()];
            body = `<p>${linkifyText(escapeHTML(e.uitleg || ''))}</p>`;
            if (e.ref) body += `<p style="color:var(--gold);font-size:13px;">${refToLink(e.ref)}</p>`;
            if (e.boeken && e.boeken.length) body += `<p class="begrip-boeken"><strong>Voorkomend in:</strong> ${e.boeken.map(escapeHTML).join(', ')}</p>`;
            meta = `Nederlandse begrippen-supplement (${e.categorie || 'begrip'})`;
        } else {
            // Fallback voor click op item zonder bron-info: gebruik huidige item-data
            const found = alleBegrippen.find(b => b.woord === woord);
            if (found) {
                body = `<p>${linkifyText(escapeHTML(found.uitleg || ''))}</p>`;
                if (found.ref) body += `<p style="color:var(--gold);font-size:13px;">${refToLink(found.ref)}</p>`;
                meta = found.categorie || '';
            } else {
                body = '<p style="color:#999;">Geen artikel gevonden.</p>';
            }
        }

        document.getElementById('detail-content').innerHTML = `
            <h2>${escapeHTML(title)}</h2>
            <div class="meta">${meta}</div>
            <div class="body">${body}</div>
        `;
        document.getElementById('detail-modal').classList.add('open');
        // URL-hash voor deeplink
        const newHash = `#woord=${woordEnc}` + (huidigeBron !== 'encyclopedie' ? `&bron=${huidigeBron}` : '');
        if (location.hash !== newHash) history.replaceState(null, '', newHash);
    }

    function closeDetail() {
        document.getElementById('detail-modal').classList.remove('open');
        // Hash ontdoen van &woord
        const params = new URLSearchParams(location.hash.slice(1).replace(/&/g, '&'));
        params.delete('woord');
        const rest = params.toString();
        history.replaceState(null, '', rest ? '#' + rest : ' ');
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDetail();
    });

    // Letter-navigatie
    document.getElementById('bron-select').addEventListener('change', (e) => laadBron(e.target.value));

    // Vul dropdown dynamisch met alle beschikbare begrippenlijsten uit INDEX
    (async () => {
        try {
            const r = await fetch('data/begrippenlijst-INDEX.json');
            const idx = await r.json();
            const sel = document.getElementById('bron-select');
            // Optgroup OT
            const ot = idx.filter(b => b.testament === 'OT');
            const nt = idx.filter(b => b.testament === 'NT');
            if (ot.length) {
                const og = document.createElement('optgroup');
                og.label = 'Oude Testament';
                ot.forEach(b => {
                    const o = document.createElement('option');
                    o.value = b.slug;
                    o.textContent = `${b.name} (${b.count})`;
                    og.appendChild(o);
                });
                sel.appendChild(og);
            }
            if (nt.length) {
                const og = document.createElement('optgroup');
                og.label = 'Nieuwe Testament';
                nt.forEach(b => {
                    const o = document.createElement('option');
                    o.value = b.slug;
                    o.textContent = `${b.name} (${b.count})`;
                    og.appendChild(o);
                });
                sel.appendChild(og);
            }
        } catch(e) {
            console.warn('Begrippenlijst INDEX kon niet geladen worden', e);
        }
    })();

    // Bepaal initiële bron + woord uit hash
    function parseHash() {
        const h = location.hash.slice(1);
        if (!h) return { bron: 'encyclopedie' };
        const params = {};
        for (const part of h.split('&')) {
            const [k,v] = part.split('=');
            params[k] = v ? decodeURIComponent(v) : '';
        }
        return { bron: params.bron || 'encyclopedie', woord: params.woord };
    }

    (async () => {
        const { bron, woord } = parseHash();
        const sel = document.getElementById('bron-select');
        // Wacht tot de dropdown gevuld is voor we de waarde kunnen zetten
        await new Promise(res => setTimeout(res, 100));
        if (bron && [...sel.options].some(o => o.value === bron)) sel.value = bron;
        await laadBron(bron);
        if (woord) {
            // Probeer in alle 3 bronnen
            const m = findEncyc(woord);
            if (m) openDetail(encodeURIComponent(m.key), m.source);
            else openDetail(encodeURIComponent(woord), 'unknown');
        }
    })();

    window.addEventListener('hashchange', () => {
        const { bron, woord } = parseHash();
        if (bron !== huidigeBron) {
            const sel = document.getElementById('bron-select');
            if ([...sel.options].some(o => o.value === bron)) {
                sel.value = bron;
                laadBron(bron).then(() => {
                    if (woord) {
                        const m = findEncyc(woord);
                        if (m) openDetail(encodeURIComponent(m.key), m.source);
                    }
                });
            }
        } else if (woord) {
            const m = findEncyc(woord);
            if (m) openDetail(encodeURIComponent(m.key), m.source);
        }
    });
    </script>
    </div>
    </div>
</body>
</html>
