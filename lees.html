<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Staten Vertaling</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/lees.css">
</head>
<body>
    <!-- Header -->
    <header id="reader-header">
        <div class="header-left">
            <h1 class="site-title">Open Staten Vertaling</h1>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <input type="text" id="lees-search-trigger" readonly placeholder="Zoek in Gods Woord..." autocomplete="off" aria-label="Zoeken — opent zoek-overlay">
            </div>
        </div>
        <div class="header-right">
            <button id="dark-mode-toggle" title="Donkere modus" aria-label="Donkere modus">
                <span class="icon-sun">&#9788;</span>
                <span class="icon-moon">&#9790;</span>
            </button>
        </div>
    </header>

    <!-- Navigation bar -->
    <nav id="book-nav">
        <button id="nav-book-btn" class="nav-selector" aria-label="Kies boek">
            <span id="nav-book-name">Genesis</span>
            <span class="nav-arrow">&#9662;</span>
        </button>
        <div id="chapter-buttons" class="chapter-btns"></div>
        <button id="prev-ch" class="ch-arrow" title="Vorig hoofdstuk" aria-label="Vorig hoofdstuk">&#8249;</button>
        <button id="next-ch" class="ch-arrow" title="Volgend hoofdstuk" aria-label="Volgend hoofdstuk">&#8250;</button>
    </nav>

    <!-- Book selector overlay -->
    <div id="book-selector" class="overlay hidden">
        <div class="overlay-content">
            <div class="overlay-header">
                <h2>Kies een boek</h2>
                <button class="overlay-close" aria-label="Sluiten">&times;</button>
            </div>
            <div id="book-list"></div>
        </div>
    </div>

    <!-- Main content -->
    <main id="reader-content">
        <article id="chapter-text">
            <div id="book-intro" class="book-intro hidden"></div>
            <h2 id="chapter-heading"></h2>
            <p id="chapter-intro" class="chapter-intro"></p>
            <div id="verses"></div>
        </article>
    </main>

    <!-- Margin notes panel (desktop) -->
    <aside id="notes-panel" class="hidden">
        <div class="notes-panel-header">
            <h3>Kanttekeningen</h3>
            <button class="notes-close" aria-label="Sluiten">&times;</button>
        </div>
        <div id="notes-content"></div>
    </aside>

    <!-- Copy / share toolbar — verschijnt onderin als verzen geselecteerd zijn -->
    <div id="copy-toolbar" class="copy-toolbar">
        <span id="copy-count"></span>
        <button id="vers-share" title="Delen via systeem">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
            Delen
        </button>
        <button id="copy-plain" title="Kopieer als platte tekst">Kopiëren</button>
        <button id="copy-formatted" title="Kopieer met versnummers en opmaak">Met opmaak</button>
        <button id="vers-image" title="Maak afbeelding met de tekst">Op afbeelding</button>
        <button id="copy-close" title="Deselecteer alles">&times;</button>
    </div>

    <!-- Modal voor afbeelding-preview (verschijnt na 'Op afbeelding') -->
    <div id="vers-image-modal" class="overlay hidden" role="dialog" aria-label="Afbeelding van vers">
        <div style="background:#fff;border-radius:8px;padding:18px;max-width:680px;width:92vw;max-height:92vh;overflow:auto;display:flex;flex-direction:column;align-items:center;gap:12px;">
            <canvas id="vers-image-canvas" style="max-width:100%;height:auto;border:1px solid #e5e1d8;border-radius:6px;background:#f8f6f2;"></canvas>
            <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
                <button id="vers-image-download" style="background:#cba449;color:#fff;border:none;padding:9px 18px;border-radius:5px;font-weight:600;cursor:pointer;">Download als PNG</button>
                <button id="vers-image-share" style="background:#142e42;color:#fff;border:none;padding:9px 18px;border-radius:5px;font-weight:600;cursor:pointer;">Delen</button>
                <button id="vers-image-close" style="background:#eee;color:#333;border:none;padding:9px 18px;border-radius:5px;font-weight:600;cursor:pointer;">Sluiten</button>
            </div>
        </div>
    </div>

    <!-- Lexicon modal -->
    <div id="lexicon-modal" class="overlay hidden">
        <div class="overlay-content overlay-large">
            <div class="overlay-header">
                <h2 id="lexicon-title">Lexicon</h2>
                <button class="overlay-close" aria-label="Sluiten">&times;</button>
            </div>
            <div id="lexicon-body"></div>
        </div>
    </div>

    <!-- Strong's popover -->
    <div id="strongs-popover" class="popover hidden">
        <div class="popover-word" id="popover-word"></div>
        <div class="popover-strongs" id="popover-strongs"></div>
        <div class="popover-gloss" id="popover-gloss"></div>
        <button class="popover-more" id="popover-more">Meer in lexicon</button>
    </div>

    <!-- Footer: altijd zichtbaar onderaan met vorig/volgend hoofdstuk + audio-knop -->
    <footer id="reader-footer" class="reader-footer" aria-label="Hoofdstuk-navigatie en voorlezing">
        <button class="rf-btn rf-nav" id="rf-prev" aria-label="Vorig hoofdstuk" title="Vorig hoofdstuk">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="rf-btn rf-play hidden" id="audio-play-big" aria-label="Speel voorlezing af" title="Voorlezing">
            <svg class="rf-play-icon" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><polygon points="6,4 22,12 6,20" fill="currentColor"/></svg>
            <svg class="rf-pause-icon" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>
        </button>
        <div class="rf-label" id="reader-footer-label" aria-live="polite">Genesis 1</div>
        <button class="rf-btn rf-nav" id="rf-next" aria-label="Volgend hoofdstuk" title="Volgend hoofdstuk">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <audio id="audio-el" preload="none"></audio>
    </footer>

    <script src="js/audio-available.js"></script>
    <script src="js/lees.js"></script>
    <script src="js/lees-lexicon.js"></script>
    <script src="js/search.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        if (window.Search) window.Search.init({ leesMode: true });
    });
    </script>
</body>
</html>
